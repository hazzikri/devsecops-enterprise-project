---
- name: Enterprise Server Hardening Simulation
  hosts: localhost
  connection: local
  tasks:
    - name: Create Secure Audit Directory
      ansible.builtin.file:
        path: "./security_audit"
        state: directory
        mode: '0700'

    - name: Generate Security Audit Log
      ansible.builtin.copy:
        content: |
          ===================================
          DEVSECOPS AUDIT LOG
          Status: Server Hardened Successfully
          Environment: GitHub Actions Runner
          ===================================
        dest: "./security_audit/audit.log"
        mode: '0600'