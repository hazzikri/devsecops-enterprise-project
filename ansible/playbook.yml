---
- name: Enterprise Server Hardening Simulation
  hosts: localhost
  connection: local
  tasks:
    - name: Create Secure Audit Directory
      ansible.builtin.file:
        path: "./security_audit"
        state: directory
        mode: '0700'

    - name: Generate Security Audit Log
      ansible.builtin.copy:
        dest: "./security_audit/hardening_report.json"
        content: |
          {
            "status": "COMPLIANT",
            "audit_time": "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}",
            "checks": [
              { "name": "SSH Hardening", "status": "PASSED" },
              { "name": "Firewall Rules", "status": "PASSED" },
              { "name": "Password Policy", "status": "PASSED" },
              { "name": "Auditd Config", "status": "PASSED" }
            ]
          }
        mode: '0600'
